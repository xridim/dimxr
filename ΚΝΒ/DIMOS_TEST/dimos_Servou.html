        <title>Ken Burns</title>
		<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.5.0/jquery.min.js"></script>
		<script type="text/javascript" src="kenburns.js"></script>
		<script type="text/javascript">
			$(function(){
				$('#kenburns').kenburns({
					images:['http://3.bp.blogspot.com/-PawHYzGiDNY/UG2epqc5jkI/AAAAAAAAD7o/aPpk3aLOV0Y/s640/lousios+arkadia.jpg',
							'https://farm8.staticflickr.com/7349/12116777395_0c99ff5fa1_z.jpg',					        
							'http://www.stokioupi.gr/wp-content/gallery/lousios/p5254323.jpg',
							'http://static.panoramio.com/photos/large/21155849.jpg',
							'http://i1.trekearth.com/photos/4576/lousios_gorge_brigde.jpg'
							],
					frames_per_second: 30,
					display_time: 9000,
					fade_time: 2000,
					zoom: 2,
					background_color:'#ffffff',
					post_render_callback:function($canvas, context) {
						// Called after the effect is rendered
						// Draw anything you like on to of the canvas
						
						context.save();
						context.fillStyle = '#000';
						context.font = 'bold 20px sans-serif';
						var width = $canvas.width();
						var height = $canvas.height();												
						var text = "*";
						var metric = context.measureText(text);
						
						context.fillStyle = '#fff';
						
						context.shadowOffsetX = 3;
						context.shadowOffsetY = 3;
						context.shadowBlur = 4;
						context.shadowColor = 'rgba(0, 0, 0, 0.8)';
						
						context.fillText(text, width - metric.width - 8, height - 8);						
						
						context.restore();						
					}
				});				
			});
			
		</script>
    </head>
    <body>
    <div align="center">
			<canvas id="kenburns" width="640" height="480">
				<p>Your browser doesn't support canvas!</p>
			</canvas>
	</div>
