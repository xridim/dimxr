<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ken Burns Slider - Optimized View</title>
    <style>
        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 60vh;
            min-height: 300px;
            margin: auto;
            overflow: hidden;
            background-color: #000;
            border-radius: 12px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
        }

        /* --- ΒΕΛΤΙΩΜΕΝΑ ANIMATIONS ΓΙΑ ΠΛΗΡΗ ΕΙΚΟΝΑ --- */

        /* Zoom In: Ξεκινά από το 1 (ολόκληρη φωτό) και μεγαλώνει ελάχιστα */
        .slide.active.zoom-in img {
            animation: kenburns-in 7s ease-out forwards;
        }

        /* Zoom Out: Ξεκινά ελαφρώς μεγαλύτερη και καταλήγει στο 1 (ολόκληρη φωτό) */
        .slide.active.zoom-out img {
            animation: kenburns-out 7s ease-out forwards;
        }

        @keyframes kenburns-in {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        @keyframes kenburns-out {
            0% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- UI ELEMENTS --- */
        .dots-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            margin: 0 6px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .dot.active {
            background-color: #ffffff;
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 600px) {
            .slideshow-container { height: 40vh; border-radius: 0; }
            .dots-bar { height: 40px; }
        }
    </style>
</head>
<body>

<div class="slideshow-container">
    <div class="slide active zoom-in"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/ΠΑΣΧΑ%2023ΠΡΟΕΔΡΟΣ.jpg"></div>
    <div class="slide"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/20263.jpg"></div>
    <div class="slide"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/ΠΑΣΧΑ7.jpg"></div>
    <div class="slide"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/ΠΑΣΧΑ10.jpg"></div>
    <div class="slide"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/ΠΑΣΧΑ8.jpg"></div>
    <div class="slide"><img src="https://www.servou.gr/images/stories/2026%20ΠΑΣΧΑ%20ΣΤΟ%20ΧΩΡΙΟ/ΠΑΣΧΑ15.jpg"></div>

    <div class="dots-bar" id="dotsContainer"></div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dotsContainer');
    let currentIndex = 0;
    const duration = 6000;

    // Δημιουργία κουκκίδων
    slides.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (index === 0) dot.classList.add('active');
        dot.onclick = () => {
            clearInterval(slideInterval);
            goToSlide(index);
            slideInterval = setInterval(nextSlide, duration);
        };
        dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll('.dot');

    function goToSlide(index) {
        slides[currentIndex].classList.remove('active', 'zoom-in', 'zoom-out');
        dots[currentIndex].classList.remove('active');
        
        currentIndex = index;

        // Εναλλαγή: Ζυγός δείκτης = Zoom In, Μονός δείκτης = Zoom Out
        const effectClass = (currentIndex % 2 === 0) ? 'zoom-in' : 'zoom-out';
        
        slides[currentIndex].classList.add('active', effectClass);
        dots[currentIndex].classList.add('active');
    }

    function nextSlide() {
        goToSlide((currentIndex + 1) % slides.length);
    }

    let slideInterval = setInterval(nextSlide, duration);
</script>

</body>
</html>
